# docker-compose.yml
services:
  mongo:
    image: 'mongo:8.0'
    networks:
      - app
    volumes:
      - "db:/data/db"
    ports:
      - "27017:27017"

  app:
    build: .
    networks:
      - app
    volumes:
      - ./:/app
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - RAILS_ENV=${RAILS_ENV:-development}
      - MONGODB_URI=${MONGODB_URI}

  test:
    build: .
    networks:
      - app
    volumes:
      - ./:/app
    depends_on:
      - mongo
    env_file:
      - .env.test
    environment:
      - RAILS_ENV=test
      - MONGODB_URI=mongodb://mongo:27017/writeon_test
    command: bundle exec rspec

networks:
  app:

volumes:
  db:
