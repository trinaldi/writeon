services:
  mongo:
    image: 'mongo:8.0'
    networks:
      - app
    volumes:
      - "db:/data/db"
    ports:
      - "27017:27017"

  app:
    build: .
    networks:
      - app
    volumes:
      - ./:/app
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=${RAILS_ENV}
      - MONGODB_URI=${MONGODB_URI}


networks:
  app:

volumes:
  db:
