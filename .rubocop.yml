plugins:
  - rubocop-factory_bot
  - rubocop-graphql
  - rubocop-performance
  - rubocop-rails
  - rubocop-rspec
AllCops:
  NewCops: enable
Style/FrozenStringLiteralComment:
  Enabled: false
Style/Documentation:
  Enabled: false
GraphQL/ObjectDescription:
  Enabled: false
GraphQL/FieldDescription:
  Enabled: false
GraphQL/ArgumentDescription:
  Enabled: false
Rails/WhereExists:
  Enabled: false
GraphQL/ExtractType:
  Enabled: false
GraphQL/ExtractInputType:
  Enabled: false
GraphQL/OrderedFields:
  Enabled: false
RSpec/MultipleExpectations:
  Max: 2
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
