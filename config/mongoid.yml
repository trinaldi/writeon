production:
  clients:
    default:
      uri: <%= Rails.application.credentials.dig(:mongo, :uri) %>
      options:
        database: writeonapi

development:
  clients:
    default:
      uri: <%= ENV['MONGODB_URI'] %>
      options:
        database: writeonapi

test:
  clients:
    default:
      database: blog_test
      hosts:
        - localhost:27017
      options:
        read:
          mode: :primary
        max_pool_size: 1
